<!DOCTYPE html>
<html lang="en">
<head>

    <title>forms practice</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<fieldset>  
    <legend>FIRST HTML FORM</legend>  
    <label for="email">Enter email here: </label>
    <input type="TEXT" id="email" placeholder="enter here">
    <br>
    <input type="submit" value="submit">
        <br>
    <form>
        <label for="datapicker">choose date: </label>
        <input type="time" id="datapicker">
    
        <br>
    <label for="selectors" >enter your choice: </label>
    <select  id="selectors">
        <option value="maggi">Maggi</option>
        <option value="kurkure">Kurkure</option>
        <option value="tea">Tea</option>
    </select>
    <br>
    <label for="text 1"> enter text here: </label>
    <br>
    <textarea name="text 1" id="text 1" rows="22" cols="30" placeholder="enter here..."></textarea>
    <br>
    <label>Choose gender:</label>
 
<input type="radio" id="male" name="gender">
<label for="male">Male</label>

<input type="radio" id="female" name="gender">
<label for="female">Female</label>
    </form>
</fieldset>

</body>
</html>
